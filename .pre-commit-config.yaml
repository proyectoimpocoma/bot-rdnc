repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      # Linter de Ruff
      - id: ruff
        args: [ --fix ]
      # Formateador de Ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0  # Usando una versión reciente
    hooks:
      - id: mypy
        # Omitir la validación de tipos en la carpeta de pruebas
        exclude: ^tests/
